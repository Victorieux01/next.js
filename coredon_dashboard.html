    ftbl.appendChild(h('div',{style:{display:'flex',padding:'10px 20px',background:'var(--bg)',borderBottom:'1px solid var(--border-light)'}},[
      h('span',{class:'tbl-col',style:{flex:'2'}},['File Name']),
      h('span',{class:'tbl-col',style:{flex:'1'}},['Upload Date']),
      h('span',{class:'tbl-col',style:{flex:'1',textAlign:'right'}},['Action']),
    ]));
    if(p.files.length===0) ftbl.appendChild(h('div',{style:{padding:'20px',fontSize:'13px',color:'var(--text-muted)',textAlign:'center'}},['No files uploaded yet.']));
    p.files.forEach((f,i)=>{
      const dlBtn=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',padding:'6px 8px',borderRadius:'8px',color:'var(--text-muted)'}},['↓']);
      ftbl.appendChild(h('div',{class:'tbl-row',style:{borderTop:i===0?'none':'1px solid var(--border-light)'}},[
        h('div',{style:{flex:'2',display:'flex',alignItems:'center',gap:'10px'}},[
          (()=>{const ic=h('div',{style:{width:'32px',height:'32px',borderRadius:'8px',background:f.type==='pdf'?'#FEF2F2':f.type==='video'?'#EFF6FF':'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}});ic.innerHTML=fileIconSVG[f.type]||fileIconSVG.doc;return ic;})(),
          h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#1E293B'}},[f.name])
        ]),
        h('div',{style:{flex:'1',fontSize:'13px',color:'var(--text-secondary)'}},[f.date]),
        h('div',{style:{flex:'1',display:'flex',justifyContent:'flex-end'}},[dlBtn])
      ]));
    });
    filesCard.appendChild(ftbl);
    container.appendChild(filesCard);
  });
}

// ── PROJECTS ──────────────────────────────────────────────────────────────────
function renderProjects(container){
  let search='',filter='All',pg=1;
  const total=projects.length,active=projects.filter(p=>p.status==='Funded'||p.status==='Pending').length,disputes=projects.filter(p=>p.status==='Dispute').length;

  container.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px'}},[
    h('h1',{style:{fontSize:'24px',fontWeight:'800',letterSpacing:'-0.03em',marginBottom:'0'}},['Projects']),
    (() => { const btn=h('button',{class:'btn'},['+ New Project']); btn.onclick=()=>renderNewProject(); return btn; })()
  ]));

  const statRow=h('div',{class:'stat-row',style:{display:'flex',gap:'12px',marginBottom:'20px'}});
  statRow.appendChild(statCard('Total Projects',total,total+' total',true,A,true));
  statRow.appendChild(statCard('Active Projects',active,active+' active',true,'#4285F4',true));
  statRow.appendChild(statCard('In Dispute',disputes,disputes+' open',disputes===0,'#EA4335',true,disputes>0));
  container.appendChild(statRow);

  const card=h('div',{class:'card'});
  let tblBody;
  function rebuild(){
    const firstPos={};
    if(tblBody) tblBody.querySelectorAll('[data-pid]').forEach(r=>{firstPos[r.dataset.pid]=r.getBoundingClientRect().top;});
    if(tblBody) tblBody.remove();
    const PER=8;
    const rows=sortProjects(projects.filter(p=>filter==='All'||p.status===filter).filter(p=>p.name.toLowerCase().includes(search.toLowerCase())));
    tblBody=h('div',{});
    rows.slice((pg-1)*PER,pg*PER).forEach((p,i)=>{
      const pinBtn2=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:'6px',transition:'all 0.12s',display:'flex',alignItems:'center'}});
      pinBtn2.innerHTML=pinSVG(p.pinned);
      pinBtn2.onmouseenter=()=>{pinBtn2.style.background='#DBEAFE';const s=pinBtn2.querySelector('svg');if(p.pinned)s.setAttribute('fill','#0056B3');else{s.setAttribute('stroke','#0984E3');s.setAttribute('fill','none');}};
      pinBtn2.onmouseleave=()=>{pinBtn2.style.background='transparent';const s=pinBtn2.querySelector('svg');if(p.pinned)s.setAttribute('fill','#0984E3');else{s.setAttribute('stroke','#CBD5E1');s.setAttribute('fill','none');}};
      pinBtn2.onclick=e=>{e.stopPropagation();p.pinned=!p.pinned;rebuild();};
      const row=h('div',{class:'tbl-row','data-pid':String(p.id),style:{borderTop:i===0?'none':'1px solid var(--border-light)'}},[
        h('div',{style:{flex:'1',display:'flex',alignItems:'center',gap:'10px'}},[av(p),h('span',{style:{fontSize:'14px',fontWeight:'600'}},[p.name])]),
        h('div',{class:'hide-m',style:{flex:'2',fontSize:'13px',color:'var(--text-secondary)'}},[p.description]),
        h('div',{style:{flex:'1'}},[badge(p.status)]),
        h('div',{style:{flex:'1',textAlign:'right',fontWeight:'600',fontSize:'14px'}},[fmt(p.amount)]),
        h('div',{style:{flex:'0.5',display:'flex',justifyContent:'flex-end',alignItems:'center'}},[pinBtn2]),
      ]);
      row.onclick=e=>{if(e.target!==pinBtn2&&!pinBtn2.contains(e.target))renderProjectDetail(p,()=>navigate('projects',renderProjects));};
      tblBody.appendChild(row);
    });
    tblBody.appendChild(paginator(rows.length,PER,pg,newPg=>{pg=newPg;rebuild();}));
    card.appendChild(tblBody);
    tblBody.querySelectorAll('[data-pid]').forEach(r=>{
      const pid=r.dataset.pid;
      if(firstPos[pid]!=null){
        const delta=firstPos[pid]-r.getBoundingClientRect().top;
        if(Math.abs(delta)>1){
          r.style.transform='translateY('+delta+'px)';
          r.style.transition='none';
          void r.offsetHeight;
          r.style.transition='transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
          r.style.transform='translateY(0)';
        }
      }
    });
  }

  const selFilter=h('select',{class:'fsel'},['All','Funded','Released','Pending','Dispute'].map(s=>h('option',{value:s},[s])));
  selFilter.onchange=()=>{filter=selFilter.value;pg=1;rebuild();};
  const sb=searchBox(v=>{search=v;pg=1;rebuild();});
  card.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px 12px',flexWrap:'wrap',gap:'10px'}},[
    h('span',{style:{fontSize:'16px',fontWeight:'700'}},['All Projects']),
    h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},[sb,selFilter])
  ]));
  card.appendChild(h('div',{class:'tbl-header'},[
    h('span',{class:'tbl-col',style:{flex:'1'}},['Client']),
    h('span',{class:'tbl-col hide-m',style:{flex:'2'}},['Description']),
    h('span',{class:'tbl-col',style:{flex:'1'}},['Status']),
    h('span',{class:'tbl-col',style:{flex:'1',textAlign:'right'}},['Amount']),
    h('span',{class:'tbl-col',style:{flex:'0.3'}},['']),
  ]));
  rebuild();
  container.appendChild(card);
}

// ── NEW PROJECT (2-step) ──────────────────────────────────────────────────────
function renderNewProject(){
  navigate('projects',container=>{
    let step=1;
    // Project data accumulated across steps
    const draft={name:'',email:'',description:'',startDate:'',endDate:'',expectedDate:'',amount:'',
      revisions:3,revisionNote:'Revisions must be requested within 48 hours of delivery.',
      delayPenalty:true,scopeChange:true,ownershipTransfer:true,
      confidentiality:true,latePayment:true,arbitration:true,
      contractNote:''};

    const backLink=h('span',{style:{cursor:'pointer',color:'#0984E3',fontWeight:'600'}},['Projects']);
    backLink.onclick=()=>navigate('projects',renderProjects);
    const breadcrumb=h('div',{style:{fontSize:'13px',color:'var(--text-muted)',marginBottom:'6px'}},[backLink,' / New Project']);
    container.appendChild(breadcrumb);

    const titleEl=h('h1',{style:{fontSize:'24px',fontWeight:'800',letterSpacing:'-0.03em',marginBottom:'4px'}},['Create a New Project']);
    const subtitleEl=h('p',{style:{fontSize:'14px',color:'var(--text-secondary)',marginBottom:'22px'}},['Step 1 of 2 — Project Info & Client']);
    container.appendChild(titleEl);
    container.appendChild(subtitleEl);

    // Step indicators
    const steps=h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'28px'}});
    function mkStepPip(n,label){
      const active=step>=n;
      const dot=h('div',{style:{width:'28px',height:'28px',borderRadius:'50%',background:active?'#0984E3':'var(--border)',color:active?'#fff':'#94A3B8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'700',flexShrink:'0',transition:'all 0.2s'}},[String(n)]);
      const lbl=h('span',{style:{fontSize:'13px',fontWeight:'600',color:active?'#0F172A':'#94A3B8',transition:'all 0.2s'}},[label]);
      return {el:h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},[dot,lbl]),dot,lbl};
    }
    const pip1=mkStepPip(1,'Project Info');
    const pipLine=h('div',{style:{flex:'1',height:'2px',background:'#E2E8F0',borderRadius:'1px',maxWidth:'60px'}});
    const pip2=mkStepPip(2,'Contract');
    steps.appendChild(pip1.el); steps.appendChild(pipLine); steps.appendChild(pip2.el);
    container.appendChild(steps);

    const stepContainer=h('div',{});
    container.appendChild(stepContainer);

    function updatePips(){
      [pip1,pip2].forEach((p,i)=>{
        const active=step>=(i+1);
        p.dot.style.background=active?A:'#E2E8F0';
        p.dot.style.color=active?'#fff':'#94A3B8';
        p.lbl.style.color=active?'#0F172A':'#94A3B8';
      });
      pipLine.style.background=step>=2?'#0984E3':'var(--border)';
      subtitleEl.textContent=step===1?'Step 1 of 2 — Project Info & Client':'Step 2 of 2 — Contract Builder';
    }

    // ── STEP 1 ────────────────────────────────────────────────────────────────
    function renderStep1(){
      stepContainer.innerHTML='';
      const mkField=(lbl,ph,type='text',initVal='')=>{
        const inp=h('input',{type,placeholder:ph,value:initVal,style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1',width:'100%'}});
        const box=h('div',{class:'field-box'},[inp]);
        const labelEl=h('label',{class:'field-label'});
        if(lbl.endsWith(' *')){labelEl.appendChild(document.createTextNode(lbl.slice(0,-2)));const star=h('span',{style:{color:'#EF4444',marginLeft:'2px'}},['*']);labelEl.appendChild(star);}
        else{labelEl.appendChild(document.createTextNode(lbl));}
        const wrap=h('div',{style:{flex:'1'}},[labelEl,box]);
        return{wrap,inp,get value(){return inp.value;}};
      };

      // Client field with import dropdown
      let clientDDOpen=false;
      const clientInp=h('input',{placeholder:'Type client name or company…',value:draft.name,style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1',width:'100%'}});
      const clientDD=h('div',{style:{position:'absolute',top:'100%',left:'0',right:'0',marginTop:'4px',background:'var(--surface)',borderRadius:'12px',boxShadow:'0 8px 32px rgba(0,0,0,0.12)',border:'1px solid var(--border)',zIndex:'50',maxHeight:'200px',overflowY:'auto',display:'none'}});
      function buildClientDD(q){
        clientDD.innerHTML='';
        const sorted=[...clients].sort((a,b)=>{
          const countA=projects.filter(p=>p.email===a.email).length;
          const countB=projects.filter(p=>p.email===b.email).length;
          return countB-countA;
        });
        const matches=sorted.filter(c=>c.company.toLowerCase().includes(q.toLowerCase())||c.name.toLowerCase().includes(q.toLowerCase()));
        if(matches.length===0){clientDD.style.display='none';return;}
        matches.forEach(c=>{
          const item=h('div',{style:{padding:'10px 14px',cursor:'pointer',fontSize:'13px',fontWeight:'500',display:'flex',alignItems:'center',gap:'10px'}});
          const col2=COLS[clients.indexOf(c)%COLS.length];
          item.appendChild(h('div',{style:{width:'26px',height:'26px',borderRadius:'50%',background:col2+'22',color:col2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'700',flexShrink:'0'}},[c.company[0]]));
          item.appendChild(h('div',{style:{flex:'1'}},[h('div',{style:{fontWeight:'600'}},[c.company]),h('div',{style:{fontSize:'11px',color:'var(--text-muted)'}},[c.email])]));
          item.onmouseenter=()=>item.style.background='var(--bg)';
          item.onmouseleave=()=>item.style.background='transparent';
          item.onclick=()=>{
            clientInp.value=c.company;
            emailField.inp.value=c.email;
            draft.name=c.company; draft.email=c.email;
            draft.clientFullName=c.name||c.company;
            draft.clientPhone=c.phone||'';
            draft.clientAddress=c.address||'';
            clientDD.style.display='none';
            // clear error if any
            clientBox.style.borderColor=''; clientBox.style.boxShadow='';
            const e=clientWrap.querySelector('.field-error'); if(e) e.remove();
          };
          clientDD.appendChild(item);
        });
        clientDD.style.display='block';
      }
      clientInp.oninput=()=>{buildClientDD(clientInp.value); clientBox.style.borderColor=''; clientBox.style.boxShadow=''; const e=clientWrap.querySelector('.field-error'); if(e) e.remove();};
      clientInp.onfocus=()=>{buildClientDD(clientInp.value);};
      document.addEventListener('click',e=>{if(!clientWrap.contains(e.target))clientDD.style.display='none';});
      const clientBox=h('div',{class:'field-box',style:{position:'relative'}});
      clientBox.appendChild(clientInp);
      const clientLabel=h('label',{class:'field-label'});
      clientLabel.innerHTML='Client Name / Company <span style="color:#EF4444;margin-left:2px">*</span>';
      const clientWrap=h('div',{style:{flex:'1',position:'relative'}},[clientLabel,clientBox,clientDD]);

      const emailField=mkField('Client Email *','client@example.com','email',draft.email);
      const descField=mkField('Project Description *','e.g. Brand Reel Q2',undefined,draft.description);
      const startField=mkField('Start Date *','YYYY-MM-DD',undefined,draft.startDate);
      const endField=mkField('Deadline (Contract End) *','YYYY-MM-DD',undefined,draft.endDate);
      const expectedField=mkField('Expected Delivery Date *','YYYY-MM-DD',undefined,draft.expectedDate);

      const amtInp=h('input',{placeholder:'0.00',value:draft.amount,style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1'}});
      const amtBox=h('div',{class:'field-box'},[h('span',{style:{color:'var(--text-muted)',fontSize:'14px'}},['$']),amtInp]);
      const amtLabel=h('label',{class:'field-label'});
      amtLabel.innerHTML='Amount (CAD) <span style="color:#EF4444;margin-left:2px">*</span>';
      const amtWrap=h('div',{style:{flex:'1'}},[amtLabel,amtBox]);
      amtInp.oninput=()=>{amtBox.style.borderColor='';amtBox.style.boxShadow='';const e=amtWrap.querySelector('.field-error');if(e)e.remove();};

      // Date validation helper: YYYY-MM-DD, year 2020–2035
      function isValidDate(v){
        if(!/^\d{4}-\d{2}-\d{2}$/.test(v)) return false;
        const yr=parseInt(v.slice(0,4),10);
        return yr>=2020&&yr<=2035;
      }

      // Inline error helpers for step 1
      function showErr1(wrap,box,msg){
        box.style.borderColor='#EF4444';box.style.boxShadow='0 0 0 3px rgba(239,68,68,0.1)';
        const old=wrap.querySelector('.field-error');if(old)old.remove();
        const e=document.createElement('div');e.className='field-error';
        e.style.cssText='font-size:11px;font-weight:600;color:#EF4444;margin-top:5px;display:flex;align-items:center;gap:4px;';
        e.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> '+msg;
        wrap.appendChild(e);
      }
      function clearErr1(wrap,box){box.style.borderColor='';box.style.boxShadow='';const e=wrap.querySelector('.field-error');if(e)e.remove();}
      // Wire oninput clear for all fields
      [emailField,descField,startField,endField,expectedField].forEach(f=>{
        f.inp.oninput=()=>{const fb=f.wrap.querySelector('.field-box');if(fb){fb.style.borderColor='';fb.style.boxShadow='';}const er=f.wrap.querySelector('.field-error');if(er)er.remove();};
      });

      const nextBtn=h('button',{class:'btn',style:{padding:'11px 28px',display:'inline-flex',alignItems:'center',gap:'6px'}});
      nextBtn.innerHTML='Continue <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle"><polyline points="9 18 15 12 9 6"/></svg>';
      const cancelBtn=h('button',{class:'btn-outline'},['Back to Projects']);
      cancelBtn.onclick=()=>navigate('projects',renderProjects);
      nextBtn.onclick=()=>{
        draft.name=clientInp.value; draft.email=emailField.value; draft.description=descField.value;
        draft.startDate=startField.value; draft.endDate=endField.value; draft.expectedDate=expectedField.value;
        draft.amount=amtInp.value;

        // Clear all errors
        clientBox.style.borderColor=''; clientBox.style.boxShadow='';
        const existingErr=clientWrap.querySelector('.field-error'); if(existingErr) existingErr.remove();
        [emailField,descField,startField,endField,expectedField].forEach(f=>{
          const fb=f.wrap.querySelector('.field-box');if(fb){fb.style.borderColor='';fb.style.boxShadow='';}
          const er=f.wrap.querySelector('.field-error');if(er)er.remove();
        });
        amtBox.style.borderColor='';amtBox.style.boxShadow='';const amtErr=amtWrap.querySelector('.field-error');if(amtErr)amtErr.remove();

        let firstFocus=null;
        if(!draft.name.trim()){
          clientBox.style.borderColor='#EF4444'; clientBox.style.boxShadow='0 0 0 3px rgba(239,68,68,0.1)';
          const e=document.createElement('div');e.className='field-error';
          e.style.cssText='font-size:11px;font-weight:600;color:#EF4444;margin-top:5px;display:flex;align-items:center;gap:4px;';
          e.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Client name is required';
          clientWrap.appendChild(e); if(!firstFocus)firstFocus=clientInp;
        }
        if(!draft.email.trim()){showErr1(emailField.wrap,emailField.wrap.querySelector('.field-box'),'Client email is required');if(!firstFocus)firstFocus=emailField.inp;}
        if(!draft.description.trim()){showErr1(descField.wrap,descField.wrap.querySelector('.field-box'),'Project description is required');if(!firstFocus)firstFocus=descField.inp;}
        if(!draft.startDate.trim()){showErr1(startField.wrap,startField.wrap.querySelector('.field-box'),'Start date is required');if(!firstFocus)firstFocus=startField.inp;}
        else if(!isValidDate(draft.startDate)){showErr1(startField.wrap,startField.wrap.querySelector('.field-box'),'Format: YYYY-MM-DD, year 2020–2035');if(!firstFocus)firstFocus=startField.inp;}
        if(!draft.endDate.trim()){showErr1(endField.wrap,endField.wrap.querySelector('.field-box'),'Deadline is required');if(!firstFocus)firstFocus=endField.inp;}
        else if(!isValidDate(draft.endDate)){showErr1(endField.wrap,endField.wrap.querySelector('.field-box'),'Format: YYYY-MM-DD, year 2020–2035');if(!firstFocus)firstFocus=endField.inp;}
        if(!draft.expectedDate.trim()){showErr1(expectedField.wrap,expectedField.wrap.querySelector('.field-box'),'Expected delivery date is required');if(!firstFocus)firstFocus=expectedField.inp;}
        else if(!isValidDate(draft.expectedDate)){showErr1(expectedField.wrap,expectedField.wrap.querySelector('.field-box'),'Format: YYYY-MM-DD, year 2020–2035');if(!firstFocus)firstFocus=expectedField.inp;}
        if(!draft.amount||isNaN(parseFloat(draft.amount))||parseFloat(draft.amount)<=0){showErr1(amtWrap,amtBox,'Amount is required');if(!firstFocus)firstFocus=amtInp;}
        if(firstFocus){firstFocus.focus();return;}
        step=2; updatePips(); renderStep2();
      };

      const formCol=h('div',{style:{flex:'1',minWidth:'0'}});
      formCol.appendChild(h('div',{style:{display:'flex',gap:'14px',marginBottom:'16px',flexWrap:'wrap'}},[clientWrap,emailField.wrap]));
      formCol.appendChild(h('div',{style:{marginBottom:'16px'}},[descField.wrap]));
      formCol.appendChild(h('div',{style:{display:'flex',gap:'14px',marginBottom:'16px'}},[startField.wrap,endField.wrap]));
      formCol.appendChild(h('div',{style:{marginBottom:'16px'}},[expectedField.wrap]));
      formCol.appendChild(h('div',{style:{marginBottom:'24px'}},[amtWrap]));
      formCol.appendChild(h('div',{style:{display:'flex',gap:'12px'}},[nextBtn,cancelBtn]));
      stepContainer.appendChild(formCol);
    }

    // ── STEP 2 ────────────────────────────────────────────────────────────────
    function renderStep2(){
      stepContainer.innerHTML='';

      const mkNum=(lbl,val,min,max)=>{
        const inp=h('input',{type:'number',value:String(val),min:String(min),max:String(max),style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1',width:'60px'}});
        const wrap=h('div',{style:{flex:'1'}},[h('label',{class:'field-label'},[lbl]),h('div',{class:'field-box'},[inp])]);
        return{wrap,get value(){return parseInt(inp.value)||0;}};
      };
      const mkTA=(lbl,ph,val='')=>{
        const ta=h('textarea',{placeholder:ph,style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',width:'100%',resize:'vertical',minHeight:'72px'}});
        ta.value=val;
        const wrap=h('div',{style:{marginBottom:'16px'}},[h('label',{class:'field-label'},[lbl]),h('div',{class:'field-box',style:{alignItems:'flex-start',padding:'10px 14px'}},[ta])]);
        return{wrap,get value(){return ta.value;}};
      };
      const mkToggle=(lbl,sub,checked)=>{
        let on=checked;
        const pill=h('div',{style:{width:'36px',height:'20px',borderRadius:'10px',background:on?'#0984E3':'#CBD5E1',cursor:'pointer',position:'relative',flexShrink:'0',transition:'background 0.15s'}});
        const knob=h('div',{style:{width:'14px',height:'14px',borderRadius:'50%',background:'var(--surface)',position:'absolute',top:'3px',left:on?'19px':'3px',transition:'left 0.15s'}});
        pill.appendChild(knob);
        const row=h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--border-light)'}});
        row.appendChild(h('div',{},[h('div',{style:{fontSize:'13px',fontWeight:'600'}},[lbl]),h('div',{style:{fontSize:'11px',color:'var(--text-muted)',marginTop:'1px'}},[sub])]));
        row.appendChild(pill);
        pill.onclick=()=>{on=!on;pill.style.background=on?'#0984E3':'#CBD5E1';knob.style.left=on?'19px':'3px';};
        return{row,get value(){return on;}};
      };

      const numRev=mkNum('Number of Allowed Revisions',draft.revisions,1,20);
      const taRevNote=mkTA('Revision Terms','e.g. Each revision must be requested within 48h of delivery…',draft.revisionNote);
      const taNote=mkTA('General Contract Notes','Add any specific terms, disclaimers, or custom clauses…',draft.contractNote);

      const tDelay=mkToggle('Delay Penalty Clause','Late delivery triggers a 5% fee per week','true'||draft.delayPenalty);
      const tScope=mkToggle('Scope Change Protection','Any out-of-scope work requires a new escrow','true'||draft.scopeChange);
      const tOwner=mkToggle('Ownership Transfer on Release','Full IP transfers to client upon escrow release','true'||draft.ownershipTransfer);
      const tConf=mkToggle('Confidentiality Agreement','Both parties agree not to disclose project details','true'||draft.confidentiality);
      const tLate=mkToggle('Late Payment Clause','Unpaid escrow after 30 days incurs a 2% monthly fee','true'||draft.latePayment);
      const tArb=mkToggle('Binding Arbitration','Disputes resolved through binding arbitration','true'||draft.arbitration);

      const backBtn=h('button',{class:'btn-outline',style:{display:'inline-flex',alignItems:'center',gap:'6px'}});
      backBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle"><polyline points="15 18 9 12 15 6"/></svg>Back';
      backBtn.onclick=()=>{step=1;updatePips();renderStep1();};

// ── CLIENTS ───────────────────────────────────────────────────────────────────
function renderClients(container){
  let search='',filter='All',pg=1;
  const totalClients=clients.length;
  const activeClientIds=new Set(projects.filter(p=>p.status==='Funded'||p.status==='Pending').map(p=>p.email));
  const activeClients=clients.filter(c=>activeClientIds.has(c.email)).length;
  const disputeClientIds=new Set(projects.filter(p=>p.status==='Dispute').map(p=>p.email));
  const disputeClients=clients.filter(c=>disputeClientIds.has(c.email)).length;

  // Previous month reference — for deltas
  const earnDC=computeMonthlyEarnings();
  const prevMoEntry=earnDC.length>=2?earnDC[earnDC.length-2]:null;
  let pmStart=null,pmEnd=null;
  if(prevMoEntry){const [ry,rm]=prevMoEntry.key.split('-').map(Number);pmStart=new Date(ry,rm-1,1);pmEnd=new Date(ry,rm,0);}
  const clientEmailSet=new Set(clients.map(c=>c.email));
  // New clients last month = clients whose first matching project started in prev month
  const newLastMo=pmStart?new Set(projects.filter(p=>clientEmailSet.has(p.email)&&p.startDate&&new Date(p.startDate)>=pmStart&&new Date(p.startDate)<=pmEnd).map(p=>p.email)).size:0;
  // Active clients last month = clients with a prepaid project active during prev month
  const prevActiveCount=pmStart?clients.filter(c=>projects.some(p=>p.email===c.email&&p.prepaidDate&&new Date(p.prepaidDate)<=pmEnd&&(p.status==='Funded'||p.status==='Pending'||(p.releasedDate&&new Date(p.releasedDate)>=pmStart)))).length:activeClients;
  // Disputes opened last month
  const disputesLastMo=pmStart?projects.reduce((n,p)=>n+(p.disputes||[]).filter(d=>d.date&&new Date(d.date)>=pmStart&&new Date(d.date)<=pmEnd).length,0):0;

  container.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'24px'}},[
    h('h1',{style:{fontSize:'24px',fontWeight:'800',letterSpacing:'-0.03em'}},['Clients']),
    (() => { const btn=h('button',{class:'btn'},['New Client +']); btn.onclick=()=>renderNewClient(()=>navigate('clients',renderClients)); return btn; })()
  ]));

  const statRow=h('div',{class:'stat-row',style:{display:'flex',gap:'12px',marginBottom:'20px'}});
  statRow.appendChild(statCard('Total Clients',totalClients,newLastMo>0?newLastMo+' new':'stable',true,'#0984E3',true));
  statRow.appendChild(statCard('Clients actifs',activeClients,prevActiveCount+' last month',activeClients>=prevActiveCount,'#00C896',true));
  statRow.appendChild(statCard('Clients en dispute',disputeClients,disputesLastMo+' open',false,'#EF4444',true,disputesLastMo>0));
  container.appendChild(statRow);

  const card=h('div',{class:'card'});
  let tblBody;
  function rebuild(){
    if(tblBody) tblBody.remove();
    const rows=clients.filter(c=>filter==='All'||(filter==='Active'&&c.outstanding>0)).filter(c=>c.company.toLowerCase().includes(search.toLowerCase())||c.name.toLowerCase().includes(search.toLowerCase()));
    tblBody=h('div',{});
    rows.slice((pg-1)*8,pg*8).forEach((c,i)=>{
      const col=COLS[clients.indexOf(c)%COLS.length];
      const delBtn=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:'6px',fontSize:'13px',color:'#CBD5E1',transition:'all 0.12s'}},['✕']);
      delBtn.onmouseenter=()=>{delBtn.style.color='#EF4444';delBtn.style.background='#FEF2F2';};
      delBtn.onmouseleave=()=>{delBtn.style.color='#CBD5E1';delBtn.style.background='transparent';};
      delBtn.onclick=e=>{
        e.stopPropagation();
        const confirmBtn=h('button',{class:'btn',style:{flex:'1',background:'#EF4444',boxShadow:'none'}},['Yes, Delete']);
        const cancelBtn2=h('button',{class:'btn-outline',style:{flex:'1'}},['Cancel']);
        cancelBtn2.onclick=closeModal;
        confirmBtn.onclick=()=>{clients=clients.filter(x=>x.id!==c.id);closeModal();rebuild();};
        openModal(h('div',{},[
          h('div',{style:{textAlign:'center',marginBottom:'20px'}},[
            (()=>{const td=h('div',{style:{width:'48px',height:'48px',borderRadius:'50%',background:'#FEF2F2',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}});td.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';return td;})(),
            h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'6px'}},['Delete Client?']),
            h('div',{style:{fontSize:'13px',color:'var(--text-secondary)',lineHeight:'1.5'}},['Are you sure you want to delete ',h('strong',{},[c.company]),'? This action cannot be undone.'])
          ]),
          h('div',{style:{display:'flex',gap:'10px'}},[confirmBtn,cancelBtn2])
        ]));
      };
      const editIcon=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:'6px',transition:'all 0.12s',display:'flex',alignItems:'center',flexShrink:'0'}});
      editIcon.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      editIcon.onmouseenter=()=>{editIcon.style.background='#EFF6FF';editIcon.querySelector('svg').setAttribute('stroke','#0984E3');};
      editIcon.onmouseleave=()=>{editIcon.style.background='transparent';editIcon.querySelector('svg').setAttribute('stroke','#94A3B8');};
      editIcon.onclick=e=>{e.stopPropagation();openEditClientModal(c,rebuild);};
      const row=h('div',{class:'tbl-row',style:{borderTop:i===0?'none':'1px solid var(--border-light)'}},[
        h('div',{style:{flex:'1.5',display:'flex',alignItems:'center',gap:'10px'}},[
          h('div',{class:'av',style:{width:'30px',height:'30px',background:col+'22',color:col,fontSize:'11px',fontWeight:'700'}},[c.company[0]]),
          h('span',{style:{fontSize:'14px',fontWeight:'600'}},[c.company])
        ]),
        h('div',{style:{flex:'1.5',fontSize:'14px'}},[c.name]),
        h('div',{class:'hide-m',style:{flex:'1.5',fontSize:'13px',color:'var(--text-secondary)'}},[c.email]),
        h('div',{style:{flex:'1',fontWeight:'600',fontSize:'14px'}},[fmt(c.outstanding)]),
        h('div',{class:'hide-m',style:{flex:'1',fontSize:'13px',color:'var(--text-secondary)'}},[c.note]),
        h('div',{style:{flex:'0.5',display:'flex',justifyContent:'flex-end',alignItems:'center',gap:'4px'}},[editIcon,delBtn]),
      ]);
      row.onclick=e=>{if(e.target!==editIcon&&!editIcon.contains(e.target)&&e.target!==delBtn) openEditClientModal(c,rebuild);};
      tblBody.appendChild(row);
    });
    tblBody.appendChild(paginator(rows.length,8,pg,newPg=>{pg=newPg;rebuild();}));
    card.appendChild(tblBody);
  }

  const selFilter=h('select',{class:'fsel'},[h('option',{value:'All'},['All']),h('option',{value:'Active'},['Active'])]);
  selFilter.onchange=()=>{filter=selFilter.value;pg=1;rebuild();};
  const sb=searchBox(v=>{search=v;pg=1;rebuild();});
  card.appendChild(h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px 12px',flexWrap:'wrap',gap:'10px'}},[
    h('span',{style:{fontSize:'16px',fontWeight:'700'}},['Clients List']),
    h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},[sb,selFilter])
  ]));
  card.appendChild(h('div',{class:'tbl-header'},[
    h('span',{class:'tbl-col',style:{flex:'1.5'}},['Company']),
    h('span',{class:'tbl-col',style:{flex:'1.5'}},['Name']),
    h('span',{class:'tbl-col hide-m',style:{flex:'1.5'}},['Email']),
    h('span',{class:'tbl-col',style:{flex:'1'}},['Outstanding']),
    h('span',{class:'tbl-col hide-m',style:{flex:'1'}},['Note']),
    h('span',{class:'tbl-col',style:{flex:'0.5'}},['']),
  ]));
  rebuild();
  container.appendChild(card);
}

function openEditClientModal(c,onSave){
  const mkF=(lbl,val)=>{
    const inp=h('input',{value:val||'',style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1',width:'100%'}});

    return{wrap,get value(){return inp.value;}};
  };
  const nameParts=(c.name||'').split(' ');
  const fFirst=mkF('First Name',nameParts[0]||'');
  const fLast=mkF('Last Name',nameParts.slice(1).join(' ')||'');
  const fCo=mkF('Company',c.company||'');
  const fEmail=mkF('Email',c.email||'');
  const fNote=mkF('Note',c.note||'');
  const fOut=mkF('Outstanding ($)',String(c.outstanding||0));
  const fPhone=mkF('Phone',c.phone||'');
  const fAddr=mkF('Address',c.address||'');

  const saveBtn=h('button',{class:'btn',style:{flex:'1'}},['Save Changes']);
  const cancelBtn=h('button',{class:'btn-outline',style:{flex:'1'}},['Cancel']);

  saveBtn.onclick=()=>{
    c.name=(fFirst.value+' '+fLast.value).trim()||c.name;
    c.company=fCo.value||c.company;
    c.email=fEmail.value||c.email;
    c.note=fNote.value;

    c.phone=fPhone.value;
    c.address=fAddr.value;

  const col=COLS[clients.indexOf(c)%COLS.length];
  openModal(h('div',{},[

          h('div',{style:{fontSize:'12px',color:'var(--text-muted)'}},['Edit client info'])
        ])

    ]),
    h('div',{style:{display:'flex',gap:'14px'}},[fFirst.wrap,fLast.wrap]),
    fCo.wrap,
    fEmail.wrap,
    h('div',{style:{display:'flex',gap:'14px'}},[fPhone.wrap,fOut.wrap]),
    fAddr.wrap,
    fNote.wrap,
    h('div',{style:{display:'flex',gap:'10px',marginTop:'6px'}},[saveBtn,cancelBtn])
  ]));
}

function renderNewClient(onSave){
  // Error helper for field boxes
  function showFieldError(wrap,msg){
    const fb=wrap.querySelector('.field-box');
    if(fb){fb.style.borderColor='#EF4444';fb.style.boxShadow='0 0 0 3px rgba(239,68,68,0.1)';}
    const old=wrap.querySelector('.field-error'); if(old) old.remove();
    const err=document.createElement('div');
    err.className='field-error';
    err.style.cssText='font-size:11px;font-weight:600;color:#EF4444;margin-top:5px;display:flex;align-items:center;gap:4px;';
    err.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> '+msg;
    wrap.appendChild(err);
  }
  function clearFieldError(wrap){
    const fb=wrap.querySelector('.field-box');
    if(fb){fb.style.borderColor='';fb.style.boxShadow='';}
    const err=wrap.querySelector('.field-error'); if(err) err.remove();
  }

  const mkF=(lbl,ph,required=false)=>{
    const labelEl=document.createElement('label');
    labelEl.style.cssText='font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;';
    labelEl.innerHTML=required?lbl+' <span style="color:#EF4444">*</span>':lbl;
    const inp=h('input',{placeholder:ph,style:{border:'none',fontSize:'14px',fontFamily:'inherit',color:'var(--text-primary)',background:'transparent',flex:'1',width:'100%'}});
    const fb=h('div',{class:'field-box'},[inp]);
    const wrap=h('div',{style:{flex:'1',marginBottom:'14px'}},[labelEl,fb]);
    inp.oninput=()=>clearFieldError(wrap);
    return{wrap,inp,get value(){return inp.value;}};
  };

  const fFirst=mkF('First Name','First Name',true);
  const fLast=mkF('Last Name','Last Name',true);
  const fCo=mkF('Company Name','Company Name',true);
  const fEmail=mkF('Email','client@example.com',true);
  const fPhone=mkF('Phone','000-000-0000',false);
  const fAddr=mkF('Address (Optional)','Street address',false);
  const fNote=mkF('Note','e.g. New client, VIP…',false);

  const saveBtn=h('button',{class:'btn',style:{flex:'1'}},['Save Client']);
  const cancelBtn=h('button',{class:'btn-outline',style:{flex:'1'}},['Cancel']);
  cancelBtn.onclick=closeModal;

  saveBtn.onclick=()=>{
    // Clear all errors first
    [fFirst,fLast,fCo,fEmail].forEach(f=>clearFieldError(f.wrap));
    let firstError=null;
    if(!fFirst.value.trim()){showFieldError(fFirst.wrap,'First name is required');if(!firstError)firstError=fFirst.inp;}
    if(!fLast.value.trim()){showFieldError(fLast.wrap,'Last name is required');if(!firstError)firstError=fLast.inp;}
    if(!fCo.value.trim()){showFieldError(fCo.wrap,'Company name is required');if(!firstError)firstError=fCo.inp;}
    if(!fEmail.value.trim()){showFieldError(fEmail.wrap,'Email is required');if(!firstError)firstError=fEmail.inp;}
    if(firstError){firstError.focus();return;}
    const newClient={id:Date.now(),company:fCo.value,name:(fFirst.value+' '+fLast.value).trim(),email:fEmail.value,phone:fPhone.value,address:fAddr.value,outstanding:0,note:fNote.value||'New Client'};
    clients.push(newClient);
    closeModal();
    if(onSave) onSave();
  };

  openModal(h('div',{},[
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}},[
      h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},[
        h('div',{class:'av',style:{width:'40px',height:'40px',background:'#E2E8F0',color:'var(--text-muted)',fontSize:'18px',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%'}},[' + ']),
        h('div',{},[
          h('div',{style:{fontSize:'16px',fontWeight:'700'}},['New Client']),
          h('div',{style:{fontSize:'12px',color:'var(--text-muted)'}},['Fill in the client details below'])
        ])
      ]),
      (()=>{const x=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--text-muted)',display:'flex',alignItems:'center',justifyContent:'center',padding:'4px',borderRadius:'6px',lineHeight:'1'}});x.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';x.onclick=closeModal;return x;})()
    ]),
    h('div',{style:{display:'flex',gap:'14px'}},[fFirst.wrap,fLast.wrap]),
    fCo.wrap,
    fEmail.wrap,
    h('div',{style:{display:'flex',gap:'14px'}},[fPhone.wrap]),
    fAddr.wrap,
    fNote.wrap,
    h('div',{style:{display:'flex',gap:'10px',marginTop:'6px'}},[saveBtn,cancelBtn])
  ]));
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(container){
  let search='';
  container.appendChild(h('h1',{style:{fontSize:'24px',fontWeight:'800',letterSpacing:'-0.03em',marginBottom:'24px'}},['Project History']));
  const card=h('div',{class:'card'});
  let tblBody;
  const PER_H=11;
  let pg=1;
  function rebuild(){
    if(tblBody) tblBody.remove();
    const rows=projects.filter(p=>p.status==='Released').filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
    tblBody=h('div',{});
    rows.slice((pg-1)*PER_H,pg*PER_H).forEach((p,i)=>{
      const row=h('div',{class:'tbl-row',style:{borderTop:i===0?'none':'1px solid var(--border-light)'}},[
        h('div',{style:{flex:'1',display:'flex',alignItems:'center',gap:'10px'}},[av(p),h('span',{style:{fontSize:'14px',fontWeight:'600'}},[p.name])]),
        h('div',{class:'hide-m',style:{flex:'2',fontSize:'13px',color:'var(--text-secondary)'}},[p.description]),
        h('div',{style:{flex:'1',textAlign:'right',fontWeight:'600',fontSize:'14px'}},[fmt(p.amount)]),
        h('div',{style:{flex:'1',fontSize:'12px',color:'var(--text-muted)',textAlign:'right'}},[p.releasedDate||'—']),
      ]);
      row.onclick=()=>renderProjectDetail(p,()=>navigate('history',renderHistory),true);
      tblBody.appendChild(row);
    });
    tblBody.appendChild(paginator(rows.length,PER_H,pg,newPg=>{pg=newPg;rebuild();}));
    card.appendChild(tblBody);

  // Earnings Over Time — derived from released projects, daily interpolation
  const chartCard=h('div',{class:'card',style:{padding:'0',overflow:'hidden',marginBottom:'16px',background:'#EFF6FF'}});
  (()=>{
    const fmtCAD=n=>Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0')+'\u00a0$';
    // Build daily points from EARN_DATA — smooth S-curve within each month
    function smoothstep(t){return t*t*(3-2*t);}
    const dailyPts=[];
    let cumTotal=0;
    EARN_DATA.forEach(function(mo){
      const prev=cumTotal;
      const inc=mo.v;
      for(let d=0;d<30;d++){
        const t=smoothstep(d/29);
        dailyPts.push({month:mo.month,year:mo.year,dayOfMonth:d+1,v:prev+inc*t});
      }
      cumTotal+=inc;
    });
    const grandTotal=cumTotal;
    // Header
    const eLabelDiv=document.createElement('div');
    eLabelDiv.style.cssText='font-size:11px;font-weight:600;color:#64A8D8;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;';
    eLabelDiv.textContent='Earnings Over Time';
    const eAmtEl=document.createElement('div');
    eAmtEl.style.cssText='font-size:28px;font-weight:800;letter-spacing:-0.04em;color:#0F172A;line-height:1;';
    eAmtEl.textContent=fmtCAD(grandTotal);
    const eDateEl=document.createElement('div');
    eDateEl.style.cssText='font-size:12px;color:#64A8D8;font-weight:500;margin-top:4px;min-height:18px;';
    const eHdrDiv=document.createElement('div');
    eHdrDiv.style.cssText='padding:14px 16px 8px;';
    eHdrDiv.appendChild(eLabelDiv); eHdrDiv.appendChild(eAmtEl); eHdrDiv.appendChild(eDateEl);
    chartCard.appendChild(eHdrDiv);
    // SVG — fixed normalized W so proportions stay correct at any container width
    const nMonths=EARN_DATA.length;
    const W=900, H=240, BOT=26, TOP=16, PAD=10;
    const cH=H-BOT-TOP;
    const ns='http://www.w3.org/2000/svg';
    const cSvg=document.createElementNS(ns,'svg');
    cSvg.setAttribute('viewBox','0 0 '+W+' '+H);
    cSvg.style.cssText='display:block;width:100%;';
    const defs=document.createElementNS(ns,'defs');
    const eGrad=document.createElementNS(ns,'linearGradient');
    eGrad.setAttribute('id','eg2'); eGrad.setAttribute('x1','0'); eGrad.setAttribute('y1','0'); eGrad.setAttribute('x2','0'); eGrad.setAttribute('y2','1');
    const eg1s=document.createElementNS(ns,'stop'); eg1s.setAttribute('offset','0%'); eg1s.setAttribute('stop-color','#93C5FD'); eg1s.setAttribute('stop-opacity','0.5');
    const eg2s=document.createElementNS(ns,'stop'); eg2s.setAttribute('offset','100%'); eg2s.setAttribute('stop-color','#BFDBFE'); eg2s.setAttribute('stop-opacity','0.05');
    eGrad.appendChild(eg1s); eGrad.appendChild(eg2s); defs.appendChild(eGrad); cSvg.appendChild(defs);
    const eMaxV=grandTotal||1;
    const ePts=dailyPts.map(function(d,i){
      return [PAD+i/(dailyPts.length-1)*(W-PAD*2), TOP+cH*(1-d.v/eMaxV)];
    });
    function ebez(pts){
      if(pts.length<2) return '';
      let path='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);
      for(let i=0;i<pts.length-1;i++){
        const dx=pts[i+1][0]-pts[i][0],t=0.45;
        const cp1x=pts[i][0]+dx*t,cp1y=pts[i][1];
        const cp2x=pts[i+1][0]-dx*t,cp2y=pts[i+1][1];
        path+=' C'+cp1x.toFixed(1)+','+cp1y.toFixed(1)+' '+cp2x.toFixed(1)+','+cp2y.toFixed(1)+' '+pts[i+1][0].toFixed(1)+','+pts[i+1][1].toFixed(1);
      }
      return path;
    }
    const eLinePath=ebez(ePts);
    const eAreaPath=eLinePath+' L'+ePts[ePts.length-1][0].toFixed(1)+','+(H-BOT)+' L'+ePts[0][0].toFixed(1)+','+(H-BOT)+' Z';
    const eArea=document.createElementNS(ns,'path'); eArea.setAttribute('d',eAreaPath); eArea.setAttribute('fill','url(#eg2)');
    cSvg.appendChild(eArea);
    const eLine=document.createElementNS(ns,'path'); eLine.setAttribute('d',eLinePath); eLine.setAttribute('fill','none');
    eLine.setAttribute('stroke','#3B82F6'); eLine.setAttribute('stroke-width','1.8'); eLine.setAttribute('stroke-linecap','round');
    cSvg.appendChild(eLine);
    // Month labels at equal intervals across full width
    EARN_DATA.forEach(function(mo,m){
      const x=PAD+m/(EARN_DATA.length-1)*(W-PAD*2);
      const lbl=document.createElementNS(ns,'text');
      lbl.setAttribute('x',x.toFixed(1)); lbl.setAttribute('y',String(H-5));
      lbl.setAttribute('text-anchor',m===0?'start':m===EARN_DATA.length-1?'end':'middle');
      lbl.setAttribute('font-size','10'); lbl.setAttribute('fill','#60A5FA'); lbl.setAttribute('font-weight','600');
      lbl.setAttribute('font-family',"'Plus Jakarta Sans',sans-serif");
      lbl.textContent=mo.month; cSvg.appendChild(lbl);

    // Tracker: line from circle DOWN to x-axis

    evl.setAttribute('stroke','#3B82F6'); evl.setAttribute('stroke-width','1.5'); evl.style.display='none';
    cSvg.appendChild(evl);
    const edot=document.createElementNS(ns,'circle'); edot.setAttribute('r',String(EDOT_R));
    edot.setAttribute('fill','#EFF6FF'); edot.setAttribute('stroke','#3B82F6'); edot.setAttribute('stroke-width','2'); edot.style.display='none';
    cSvg.appendChild(edot);
    const eov=document.createElementNS(ns,'rect');
    eov.setAttribute('x','0'); eov.setAttribute('y','0'); eov.setAttribute('width',String(W)); eov.setAttribute('height',String(H-BOT));
    eov.setAttribute('fill','transparent'); eov.style.cursor='default';
    cSvg.appendChild(eov);
    eov.addEventListener('mousemove',function(e){
      const pt=cSvg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
      const ctm=cSvg.getScreenCTM(); if(!ctm) return;
      const mx=pt.matrixTransform(ctm.inverse()).x;
      let best=0,bestD=Infinity;

      evl.setAttribute('x2',cx.toFixed(1)); evl.setAttribute('y2',String(H-BOT));
      edot.setAttribute('cx',cx.toFixed(1)); edot.setAttribute('cy',cy.toFixed(1));
      evl.style.display=''; edot.style.display='';
      eAmtEl.textContent=fmtCAD(dailyPts[best].v);
      eDateEl.textContent=dailyPts[best].dayOfMonth+' '+dailyPts[best].month+' '+dailyPts[best].year;
    });
    eov.addEventListener('mouseleave',function(){
      evl.style.display='none'; edot.style.display='none';
      eAmtEl.textContent=fmtCAD(grandTotal); eDateEl.textContent='';

    chartCard.appendChild(cSvg);
  })();

      planSummary.appendChild(managBtn);

      pmRow.appendChild(pmIcon);
      pmRow.appendChild(h('div',{style:{flex:'1'}},[
        h('div',{style:{fontSize:'13px',fontWeight:'700'}},['\u2022\u2022\u2022\u2022 \u2022\u2022\u2022\u2022 \u2022\u2022\u2022\u2022 4242']),
        h('div',{style:{fontSize:'11px',color:'var(--text-secondary)',marginTop:'1px'}},['Visa · Expire 08/27'])
      ]));
      const editCardBtn=h('button',{class:'btn-outline',style:{fontSize:'12px',padding:'6px 12px',flexShrink:'0'}},['Modifier']);
      editCardBtn.onclick=()=>openModal(successModal('Modifier la carte','Redirection vers le portail de facturation…'));
      pmRow.appendChild(editCardBtn);
      body.appendChild(pmRow);

      // Billing history
      body.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'var(--text-primary)',marginBottom:'10px'}},['Historique de facturation']));

        const dlBtn=h('button',{style:{background:'transparent',border:'none',cursor:status==='paid'?'pointer':'default',color:status==='paid'?'#0984E3':'#CBD5E1',fontSize:'12px',fontWeight:'600',padding:'4px 8px',borderRadius:'6px',display:'flex',alignItems:'center',gap:'4px',flexShrink:'0'}});

  renderTabContent();

const notifs=[
  {icon:'dispute',color:'#EF4444',bg:'#FEF2F2',title:'Dispute opened — Blackline Records',sub:'Client opened a dispute on "Artist Documentary Teaser"',time:'2 days ago',unread:true,

  {icon:'payment',color:'#00C896',bg:'#E6FAF5',title:'Escrow funded — Nova Collective',sub:'$3,200 CAD held in escrow for "YouTube Series Ep. 4–6"',time:'5 days ago',unread:true,

function updateNotifDot(){
  const dot=$('topbar-notif-btn')&&$('topbar-notif-btn').querySelector('.tb-notif-dot');
  if(dot) dot.style.display=notifs.some(n=>n.unread)?'':'none';
}
function openNotifPanel(){
  const iconSVGs={
    dispute:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
    payment:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
    release:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',
    upload:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  };
  const unreadCount=notifs.filter(n=>n.unread).length;
  const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.3)',zIndex:'2000',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',padding:'16px'}});
  const panel=h('div',{style:{background:'var(--surface)',borderRadius:'16px',width:'380px',maxHeight:'calc(100vh - 32px)',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.16)',border:'1px solid var(--border)',overflow:'hidden',animation:'mi 0.18s ease both'}});
  const hdr=h('div',{style:{padding:'20px 20px 14px',borderBottom:'1px solid var(--border-light)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:'0'}});
  const hdrLeft=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
  hdrLeft.appendChild(h('span',{style:{fontSize:'16px',fontWeight:'800',color:'var(--text-primary)'}},['Notifications']));
  if(unreadCount>0) hdrLeft.appendChild(h('span',{style:{background:'#EF4444',color:'#fff',borderRadius:'20px',padding:'2px 8px',fontSize:'11px',fontWeight:'700'}},[String(unreadCount)+' new']));
  const closeBtn=h('button',{style:{background:'transparent',border:'none',cursor:'pointer',color:'var(--text-muted)',display:'flex',alignItems:'center',justifyContent:'center',padding:'4px',borderRadius:'6px'}});
  closeBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  closeBtn.onclick=()=>overlay.remove();
  hdr.appendChild(hdrLeft); hdr.appendChild(closeBtn);
  panel.appendChild(hdr);
  const body=h('div',{style:{overflowY:'auto',flex:'1'}});
  notifs.forEach((n,i)=>{
    const row=h('div',{style:{display:'flex',gap:'12px',padding:'16px 20px',cursor:'pointer',background:n.unread?'#FAFBFF':'transparent',borderBottom:i<notifs.length-1?'1px solid var(--border-light)':'none',transition:'background 0.1s'}});
    row.onmouseenter=()=>{row.style.background='var(--bg)';};
    row.onmouseleave=()=>{row.style.background=n.unread?'#FAFBFF':'transparent';};
    row.onclick=()=>{
      if(n.unread){
        n.unread=false;
        updateNotifDot();
      }
      overlay.remove();
      if(n.action)n.action();
    };
    const iconBox=h('div',{style:{width:'36px',height:'36px',borderRadius:'10px',background:n.bg,color:n.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}});
    iconBox.innerHTML=iconSVGs[n.icon]||'';
    const textCol=h('div',{style:{flex:'1',minWidth:'0'}});
    textCol.appendChild(h('div',{style:{fontSize:'13px',fontWeight:n.unread?'700':'600',color:'var(--text-primary)',marginBottom:'2px',lineHeight:'1.4'}},[n.title]));
    textCol.appendChild(h('div',{style:{fontSize:'12px',color:'var(--text-secondary)',lineHeight:'1.4',marginBottom:'4px'}},[n.sub]));
    textCol.appendChild(h('div',{style:{fontSize:'11px',color:'var(--text-muted)',fontWeight:'500'}},[n.time]));
    row.appendChild(iconBox); row.appendChild(textCol);
    if(n.unread){row.appendChild(h('div',{style:{width:'7px',height:'7px',borderRadius:'50%',background:'#0984E3',flexShrink:'0',marginTop:'6px'}}));}
    else{row.appendChild(h('div',{style:{color:'var(--text-muted)',alignSelf:'center',flexShrink:'0',fontSize:'16px',lineHeight:'1'}},['›']));}
    body.appendChild(row);
  });
  const footer=h('div',{style:{padding:'14px 20px',borderTop:'1px solid var(--border-light)',flexShrink:'0',textAlign:'center'}});
  const settingsLink=h('span',{style:{fontSize:'12px',fontWeight:'600',color:'#0984E3',cursor:'pointer'}},['Notification Settings']);
  settingsLink.onclick=()=>{overlay.remove();openSettingsModal('Notifications');};
  footer.appendChild(settingsLink);
  panel.appendChild(body); panel.appendChild(footer);
  overlay.appendChild(panel);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  document.body.appendChild(overlay);
}
